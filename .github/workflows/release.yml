name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_vue_kaspa:
        description: 'Publish vue-kaspa to npm'
        type: boolean
        default: false
      publish_kaspa_wasm:
        description: 'Publish @vue-kaspa/kaspa-wasm to npm'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      vue_kaspa_released: ${{ steps.release.outputs['packages/vue-kaspa--release_created'] }}
      kaspa_wasm_released: ${{ steps.release.outputs['vendor/kaspa-wasm--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-vue-kaspa:
    needs: [release-please]
    if: |
      always() && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.vue_kaspa_released == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_vue_kaspa == true)
      )
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No registry-url: setup-node would write _authToken=${NODE_AUTH_TOKEN}
          # into .npmrc which overrides npm's trusted-publishing OIDC auth flow.
          cache: 'pnpm'
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vue-kaspa build
      - run: pnpm --filter vue-kaspa test
      - name: Publish vue-kaspa to npm (Trusted Publishing)
        working-directory: packages/vue-kaspa
        run: npm publish --provenance --access public

  publish-kaspa-wasm:
    needs: [release-please]
    if: |
      always() && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.kaspa_wasm_released == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_kaspa_wasm == true)
      )
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No registry-url: same reason as above.
          cache: 'pnpm'
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - name: Publish @vue-kaspa/kaspa-wasm to npm (Trusted Publishing)
        working-directory: vendor/kaspa-wasm
        run: npm publish --provenance --access public
