<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161c27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#49c5a3"/>
      <stop offset="100%" stop-color="#38a890"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Large decorative hexagon (background, right side) -->
  <polygon points="900,115 1073,215 1073,415 900,515 727,415 727,215" fill="none" stroke="#49c5a3" stroke-width="1.5" opacity="0.07"/>
  <polygon points="900,155 1038,235 1038,395 900,475 762,395 762,235" fill="none" stroke="#49c5a3" stroke-width="1" opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" fill="url(#accent)" rx="2"/>

  <!-- Small Kaspa hexagon icon -->
  <polygon points="148,178 179,196 179,232 148,250 117,232 117,196" fill="none" stroke="#49c5a3" stroke-width="2.5" opacity="0.9"/>
  <polygon points="148,194 165,204 165,224 148,234 131,224 131,204" fill="#49c5a3" opacity="0.25"/>

  <!-- Main title -->
  <text x="112" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#ffffff" letter-spacing="-2">vue-kaspa</text>

  <!-- Accent underline -->
  <rect x="112" y="348" width="380" height="3" fill="url(#accent)" rx="2"/>

  <!-- Subtitle -->
  <text x="112" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Vue 3 composables and Nuxt module for the Kaspa blockchain</text>

  <!-- Code pill -->
  <rect x="112" y="440" width="620" height="52" rx="8" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="112" y="440" width="4" height="52" fill="url(#accent)" rx="2"/>
  <text x="136" y="472" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="21" fill="#49c5a3">npx vue-kaspa-cli</text>
  <text x="380" y="472" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="21" fill="#475569">  ·  useRpc()  ·  useUtxo()  ·  useCrypto()</text>

  <!-- URL -->
  <text x="112" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#49c5a3" opacity="0.6">vue-kaspa.vercel.app</text>
</svg>
